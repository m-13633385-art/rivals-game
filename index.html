<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STRIKE RIVALS 2D: INFANTRY UPDATE</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; user-select: none; }
        canvas { display: block; }
        body { cursor: crosshair; }

        /* LOADING SCREEN */
        #loading-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #050505; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 999; color: #00ffff; }
        .spinner { width: 50px; height: 50px; border: 5px solid #111; border-top: 5px solid #00ffff; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* LOBBY UI */
        #lobby { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #0a1a1a 0%, #000 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200; color: #fff; text-align: center; overflow-y: auto; }
        h1 { font-size: 72px; color: #00ffff; text-shadow: 0 0 20px #00ffff; margin-bottom: 5px; letter-spacing: 5px; }
        .box { background: rgba(0,0,0,0.8); padding: 25px; border: 2px solid #00ffff; border-radius: 10px; margin: 10px; width: 550px; box-shadow: 0 0 20px rgba(0, 255, 255, 0.2); }
        .code-display { font-size: 36px; color: #ff0055; font-weight: bold; letter-spacing: 8px; margin: 15px 0; text-shadow: 0 0 10px #ff0055;}
        input, select { background: #111; border: 2px solid #00ffff; color: #fff; padding: 12px; font-size: 18px; width: 90%; text-align: center; margin-bottom: 10px; outline: none; font-family: inherit; }
        button { background: #00ffff; color: #000; border: none; padding: 15px; font-size: 20px; font-weight: bold; cursor: pointer; transition: 0.2s; width: 95%; margin-top: 10px; text-transform: uppercase; }
        button:hover { background: #fff; color: #000; transform: scale(1.02); }
        
        /* HUD UI */
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: none; }
        
        /* Health & Shield */
        #bars-container { position: absolute; bottom: 30px; left: 30px; width: 350px; }
        .bar-bg { width: 100%; height: 25px; background: #111; border: 3px solid #333; margin-top: 5px; position: relative; }
        #shield-bar { width: 100%; height: 100%; background: #00ffff; transition: width 0.1s; }
        #health-bar { width: 100%; height: 100%; background: #0f0; transition: width 0.1s; }
        .bar-text { position: absolute; top: 2px; left: 10px; font-size: 18px; font-weight: bold; color: white; text-shadow: 2px 2px 0 #000; }
        
        #menu-btn { position: absolute; top: 20px; left: 20px; background: #333; color: #fff; border: 2px solid #555; padding: 10px 20px; font-size: 16px; pointer-events: auto; cursor: pointer; }
        #menu-btn:hover { background: #ff0055; border-color: #ff0055; }

        #ammo-container { position: absolute; bottom: 30px; right: 30px; text-align: right; background: rgba(0,0,0,0.5); padding: 15px; border: 2px solid #555; }
        #weapon-text { font-size: 32px; color: #00ffff; font-weight: bold; text-shadow: 0 0 10px #00ffff; }
        #ammo-text { font-size: 28px; color: #fff; font-weight: bold; margin-top: 5px; text-shadow: 2px 2px 0 #000; transition: color 0.2s; }
        
        #scoreboard { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); padding: 10px 30px; border: 2px solid #555; }
        .score-num { font-size: 40px; font-weight: bold; margin: 0 20px; }
        .blue { color: #00ffff; text-shadow: 0 0 10px #00ffff; }
        .red { color: #ff0055; text-shadow: 0 0 10px #ff0055; }
        
        #announcer { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); font-size: 70px; font-weight: bold; color: #ffcc00; text-shadow: 0 0 20px #ffcc00; display: none; text-align: center; background: rgba(0,0,0,0.7); padding: 20px 50px; border: 4px solid #ffcc00; }
        #damage-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,0,0,0.4); opacity: 0; transition: opacity 0.1s; z-index: 5; }

        /* Powerup HUD UI */
        #buff-container { position: absolute; bottom: 100px; left: 30px; display: flex; flex-direction: column; gap: 10px; }
        .buff-text { font-size: 24px; font-weight: bold; text-shadow: 2px 2px 0 #000; display: none; }
        #buff-speed { color: #ffff00; }
        #buff-damage { color: #aa00ff; }
        #dash-cd { color: #aaaaaa; font-size: 16px; font-weight: bold; position: absolute; bottom: 100px; right: 30px; display: none;}
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <h2 id="loading-text">DEPLOYING OPERATIVE...</h2>
    </div>

    <div id="lobby">
        <h1>STRIKE RIVALS</h1>
        <div class="box">
            <h3>LOADOUT</h3>
            <select id="weapon-select"></select>
        </div>
        <div class="box">
            <h3>MATCH SETTINGS</h3>
            <select id="mode-select"><option value="1v1">1v1 DEATHMATCH (P2P Stable)</option></select>
            <select id="map-select">
                <option value="0">MAP: ABANDONED WAREHOUSE</option>
                <option value="1">MAP: JUNGLE OUTPOST</option>
                <option value="2">MAP: NEON ROOFTOPS</option>
            </select>
            <div class="code-display" id="my-id">...</div>
            <p style="color:#aaa; font-size: 12px;">HOST CODE - SEND TO RIVALS</p>
        </div>
        <div class="box">
            <h3>JOIN SQUAD</h3>
            <input type="text" id="join-input" placeholder="ENTER HOST CODE" maxlength="5">
            <button id="join-btn">CONNECT</button>
        </div>
    </div>

    <div id="hud">
        <button id="menu-btn" onclick="location.reload()">ABORT MATCH</button>
        <div id="damage-overlay"></div>
        <div id="scoreboard">
            <div class="score-num blue" id="score-you">0</div>
            <div style="color: #fff;">VS</div>
            <div class="score-num red" id="score-enemy">0</div>
        </div>
        
        <div id="buff-container">
            <div class="buff-text" id="buff-speed">⚡ ADRENALINE BOOST</div>
            <div class="buff-text" id="buff-damage">⚔️ HOLLOW POINTS (2X DMG)</div>
        </div>

        <div id="bars-container">
            <div class="bar-bg"><div id="shield-bar"></div><div class="bar-text" id="shield-text">50 / 50 KEVLAR</div></div>
            <div class="bar-bg"><div id="health-bar"></div><div class="bar-text" id="health-text">100 / 100 HEALTH</div></div>
        </div>
        
        <div id="dash-cd">DASH ON COOLDOWN</div>
        <div id="ammo-container">
            <div id="weapon-text">RIFLE</div>
            <div id="ammo-text">RELOAD: R</div>
        </div>
        <div id="announcer">FIGHT!</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        /* =====================================================================
           PART 1: INFANTRY WEAPONS & MAPS
           ===================================================================== */
        const WEAPONS = [
            { name: "Assault Rifle", type: "Auto", fireRate: 120, damage: 12, speed: 1800, spread: 0.08, color: "#ffaa00", size: 5, mag: 30, reload: 1500, knockback: 0 },
            { name: "Pump Shotgun", type: "Scatter", fireRate: 800, damage: 15, speed: 1400, spread: 0.25, color: "#aaaaaa", size: 4, pellets: 8, mag: 6, reload: 2000, knockback: 300 },
            { name: "Heavy Sniper", type: "Precision", fireRate: 1500, damage: 85, speed: 4000, spread: 0.00, color: "#ff00ff", size: 6, mag: 4, reload: 2500, knockback: 600 },
            { name: "Submachine Gun", type: "Burst", fireRate: 60, damage: 7, speed: 1600, spread: 0.15, color: "#ffffaa", size: 4, mag: 40, reload: 1200, knockback: 0 },
            { name: "RPG Launcher", type: "Explosive", fireRate: 2000, damage: 90, speed: 1000, spread: 0.05, color: "#ff3300", size: 10, mag: 1, reload: 3000, knockback: 800 },
            { name: "Plasma Rifle", type: "Energy", fireRate: 250, damage: 22, speed: 1500, spread: 0.02, color: "#00ffff", size: 7, mag: 15, reload: 1800, knockback: 100 },
            { name: "Chaingun", type: "Heavy", fireRate: 50, damage: 9, speed: 2000, spread: 0.20, color: "#ffcc00", size: 5, mag: 100, reload: 4000, knockback: 50 }
        ];

        const wSelect = document.getElementById('weapon-select');
        WEAPONS.forEach((w, i) => { const opt = document.createElement('option'); opt.value = i; opt.innerText = `[${w.type}] ${w.name}`; wSelect.appendChild(opt); });

        const MAP_SIZE = 3000; // Slightly smaller for infantry
        let currentMap = { walls: [], bg: '#222', grid: '#333', fill: '#444', border: '#555' };

        function generateMap(mapIndex) {
            let walls = [];
            walls.push({ x: -1000, y: -1000, w: MAP_SIZE + 2000, h: 1000 }); walls.push({ x: -1000, y: MAP_SIZE, w: MAP_SIZE + 2000, h: 1000 }); 
            walls.push({ x: -1000, y: 0, w: 1000, h: MAP_SIZE }); walls.push({ x: MAP_SIZE, y: 0, w: 1000, h: MAP_SIZE });

            if (mapIndex == 0) { // WAREHOUSE
                currentMap.bg = '#1a1a1a'; currentMap.grid = '#2a2a2a'; currentMap.fill = '#333'; currentMap.border = '#555';
                walls.push({x: 600, y: 600, w: 400, h: 200}); walls.push({x: 2000, y: 2200, w: 400, h: 200});
                walls.push({x: 1400, y: 1000, w: 200, h: 1000}); walls.push({x: 600, y: 2000, w: 200, h: 400});
                walls.push({x: 2200, y: 600, w: 200, h: 400});
            } else if (mapIndex == 1) { // JUNGLE
                currentMap.bg = '#0a1a0a'; currentMap.grid = '#142b14'; currentMap.fill = '#1a331a'; currentMap.border = '#2b592b';
                for(let i=0; i<10; i++) walls.push({x: Math.random()*(MAP_SIZE-400)+200, y: Math.random()*(MAP_SIZE-400)+200, w: 150, h: 150});
            } else if (mapIndex == 2) { // NEON
                currentMap.bg = '#050510'; currentMap.grid = '#0a0a20'; currentMap.fill = '#111122'; currentMap.border = '#ff0055';
                walls.push({x: 500, y: 500, w: 800, h: 800}); walls.push({x: 1700, y: 1700, w: 800, h: 800});
                walls.push({x: 500, y: 1700, w: 300, h: 300}); walls.push({x: 2200, y: 500, w: 300, h: 300});
            }
            currentMap.walls = walls;
        }

        /* =====================================================================
           PART 2: STATE & NETWORKING
           ===================================================================== */
        const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        const STATE = {
            isPlaying: false, isDead: false, isMatchOver: false,
            myHp: 100, maxHp: 100, myShield: 50, maxShield: 50, myKills: 0, enemyKills: 0, winScore: 5,
            canShoot: true, screenShake: 0, isReloading: false, currentAmmo: 0,
            buffs: { speed: 0, damage: 0 }, nextPowerupSpawn: 5000 
        };

        const NET = { peer: null, conn: null, code: '', isHost: false };
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'; for(let i=0; i<5; i++) NET.code += chars.charAt(Math.floor(Math.random() * chars.length));

        // Person object has radius instead of width/height
        const player = { x: 400, y: 400, radius: 22, color: '#00ffff', angle: 0, vx: 0, vy: 0, dashCd: 0, isDashing: false };
        const enemy = { x: -1000, y: -1000, radius: 22, color: '#ff0055', angle: 0, isDashing: false };
        
        let myWeapon = WEAPONS[0]; let enemyWeapon = WEAPONS[0]; 
        let bullets = []; let particles = []; let powerups = []; let trails = [];
        const camera = { x: 0, y: 0 };
        const mouse = { x: 0, y: 0, worldX: 0, worldY: 0, down: false }; 
        const keys = { w: false, a: false, s: false, d: false, r: false, ' ': false };

        window.addEventListener('keydown', e => { 
            if(e.key === ' ') { keys[' '] = true; e.preventDefault(); }
            else { const k = e.key.toLowerCase(); if(keys.hasOwnProperty(k)) keys[k] = true; }
        });
        window.addEventListener('keyup', e => { 
            if(e.key === ' ') keys[' '] = false;
            else { const k = e.key.toLowerCase(); if(keys.hasOwnProperty(k)) keys[k] = false; }
        });
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('mousedown', () => { mouse.down = true; }); window.addEventListener('mouseup', () => { mouse.down = false; });

        NET.peer = new Peer('RIV2D-' + NET.code);
        NET.peer.on('open', id => { document.getElementById('my-id').innerText = NET.code; });

        NET.peer.on('connection', c => {
            NET.conn = c; NET.isHost = true; setupNetwork();
            NET.conn.on('open', () => { NET.conn.send({ type: 'setup', map: document.getElementById('map-select').value, weaponIndex: document.getElementById('weapon-select').value }); });
            fakeLoadingScreen();
        });

        document.getElementById('join-btn').onclick = () => {
            const code = document.getElementById('join-input').value.toUpperCase();
            if(code.length !== 5) return alert("CODE MUST BE 5 LETTERS");
            NET.conn = NET.peer.connect('RIV2D-' + code); NET.isHost = false; setupNetwork(); fakeLoadingScreen();
        };

        function setupNetwork() {
            NET.conn.on('data', data => {
                if (data.type === 'setup') { enemyWeapon = WEAPONS[data.weaponIndex]; if(!NET.isHost) { NET.conn.send({ type: 'weapon_sync', weaponIndex: document.getElementById('weapon-select').value, map: data.map }); } startGame(data.map); }
                if (data.type === 'weapon_sync') { enemyWeapon = WEAPONS[data.weaponIndex]; startGame(data.map); }
                if (data.type === 'move') { enemy.x = data.x; enemy.y = data.y; enemy.angle = data.a; enemy.isDashing = data.dash; }
                if (data.type === 'shoot') { spawnBullet(data.bx, data.by, data.vx, data.vy, false, enemyWeapon, data.dmgColor); STATE.screenShake = 5; }
                if (data.type === 'hit') takeDamage(data.dmg);
                if (data.type === 'death') { STATE.myKills++; updateScore(); createExplosion(enemy.x, enemy.y, '#ff0000', 100); if(STATE.myKills >= STATE.winScore) triggerMatchWin("VICTORY!"); else announce("ENEMY ELIMINATED!", 1500); }
                if (data.type === 'spawn_powerup') powerups.push(data.p);
                if (data.type === 'collect_powerup') { powerups = powerups.filter(p => p.id !== data.id); createExplosion(data.x, data.y, '#ffffff', 20); }
            });
        }

        /* =====================================================================
           PART 3: CORE LOGIC 
           ===================================================================== */
        function fakeLoadingScreen() { document.getElementById('lobby').style.display = 'none'; document.getElementById('loading-screen').style.display = 'flex'; }
        
        function updateAmmoDisplay() {
            const txt = document.getElementById('ammo-text');
            if (STATE.isReloading) { txt.innerText = "RELOADING..."; txt.style.color = "#ff0000"; } 
            else { txt.innerText = `${STATE.currentAmmo} / ${myWeapon.mag}`; txt.style.color = STATE.currentAmmo <= (myWeapon.mag * 0.25) ? "#ffcc00" : "#fff"; }
        }

        function triggerReload() {
            if (STATE.isReloading || STATE.currentAmmo >= myWeapon.mag || STATE.isDead || STATE.isMatchOver) return;
            STATE.isReloading = true; updateAmmoDisplay();
            setTimeout(() => { if (!STATE.isDead) { STATE.currentAmmo = myWeapon.mag; STATE.isReloading = false; updateAmmoDisplay(); } }, myWeapon.reload);
        }

        function spawnBullet(x, y, vx, vy, isMine, wpn, customColor) {
            bullets.push({ x, y, vx, vy, isMine, life: 150, radius: wpn.size, color: customColor || wpn.color, damage: isMine ? (wpn.damage * (STATE.buffs.damage > 0 ? 2 : 1)) : wpn.damage });
        }

        function fireWeapon() {
            if (!STATE.canShoot || STATE.isDead || STATE.isMatchOver || STATE.isReloading || player.isDashing) { if (STATE.currentAmmo <= 0 && !STATE.isReloading && mouse.down) triggerReload(); return; }
            if (STATE.currentAmmo <= 0) { triggerReload(); return; }

            STATE.canShoot = false; setTimeout(() => { STATE.canShoot = true; }, myWeapon.fireRate); 
            STATE.currentAmmo--; updateAmmoDisplay(); STATE.screenShake = 10;
            
            const barrelLength = 40; const bx = player.x + Math.cos(player.angle) * barrelLength; const by = player.y + Math.sin(player.angle) * barrelLength;
            let currentBulletColor = STATE.buffs.damage > 0 ? '#aa00ff' : myWeapon.color;

            // Apply Recoil physics
            if(myWeapon.knockback > 0) {
                player.vx -= Math.cos(player.angle) * myWeapon.knockback;
                player.vy -= Math.sin(player.angle) * myWeapon.knockback;
            }

            let pellets = myWeapon.pellets || 1; 
            for(let i=0; i<pellets; i++) {
                let finalAngle = player.angle + (Math.random() - 0.5) * myWeapon.spread;
                const bvx = Math.cos(finalAngle) * myWeapon.speed; const bvy = Math.sin(finalAngle) * myWeapon.speed;
                spawnBullet(bx, by, bvx, bvy, true, myWeapon, currentBulletColor);
                if(NET.conn && NET.conn.open) NET.conn.send({ type: 'shoot', bx, by, vx: bvx, vy: bvy, dmgColor: currentBulletColor });
            }
            createExplosion(bx, by, currentBulletColor, 5); // muzzle flash
            if(STATE.currentAmmo <= 0) triggerReload();
        }

        function takeDamage(amount) {
            if (STATE.isDead || STATE.isMatchOver || player.isDashing) return; // i-frames during dash
            if (STATE.myShield > 0) { if (amount <= STATE.myShield) { STATE.myShield -= amount; amount = 0; } else { amount -= STATE.myShield; STATE.myShield = 0; } }
            STATE.myHp -= amount;

            document.getElementById('damage-overlay').style.opacity = 1; setTimeout(() => document.getElementById('damage-overlay').style.opacity = 0, 100); STATE.screenShake = 20;
            updateHUD(); if (STATE.myHp <= 0) die();
        }

        function updateHUD() {
            document.getElementById('shield-bar').style.width = Math.max(0, (STATE.myShield / STATE.maxShield) * 100) + "%";
            document.getElementById('shield-text').innerText = `${Math.floor(Math.max(0, STATE.myShield))} / ${STATE.maxShield} KEVLAR`;
            document.getElementById('health-bar').style.width = Math.max(0, (STATE.myHp / STATE.maxHp) * 100) + "%";
            document.getElementById('health-text').innerText = `${Math.floor(Math.max(0, STATE.myHp))} / ${STATE.maxHp} HEALTH`;
            
            document.getElementById('buff-speed').style.display = STATE.buffs.speed > 0 ? 'block' : 'none';
            document.getElementById('buff-damage').style.display = STATE.buffs.damage > 0 ? 'block' : 'none';
        }

        function collectPowerup(type) {
            if (type === 'speed') { STATE.buffs.speed = 5000; announce("ADRENALINE BOOST!", 1000); }
            else if (type === 'shield') { STATE.myShield = Math.min(STATE.maxShield, STATE.myShield + 25); announce("KEVLAR RESTORED!", 1000); }
            else if (type === 'damage') { STATE.buffs.damage = 5000; announce("HOLLOW POINTS LOADED!", 1000); }
            updateHUD();
        }

        function die() {
            STATE.isDead = true; STATE.isReloading = false; STATE.enemyKills++; updateScore(); createExplosion(player.x, player.y, '#ff0000', 100);
            if(NET.conn) NET.conn.send({ type: 'death' });
            if(STATE.enemyKills >= STATE.winScore) triggerMatchWin("DEFEAT."); else { announce("KILLED IN ACTION", 2000); setTimeout(respawn, 2500); }
        }

        function respawn() {
            STATE.isDead = false; STATE.myHp = STATE.maxHp; STATE.myShield = STATE.maxShield; STATE.buffs = { speed: 0, damage: 0 };
            STATE.currentAmmo = myWeapon.mag; STATE.isReloading = false; player.vx = 0; player.vy = 0; updateAmmoDisplay(); updateHUD();
            player.x = NET.isHost ? 300 : MAP_SIZE - 300; player.y = NET.isHost ? 300 : MAP_SIZE - 300; player.angle = NET.isHost ? 0 : Math.PI;
        }

        function triggerMatchWin(msg) {
            STATE.isMatchOver = true; announce(msg, 4000); document.getElementById('hud').style.background = "rgba(0,0,0,0.8)"; powerups = [];
            setTimeout(() => { STATE.myKills = 0; STATE.enemyKills = 0; updateScore(); STATE.isMatchOver = false; document.getElementById('hud').style.background = "transparent"; respawn(); announce("NEXT ROUND: FIGHT!", 2000); }, 4000);
        }

        function updateScore() { document.getElementById('score-you').innerText = STATE.myKills; document.getElementById('score-enemy').innerText = STATE.enemyKills; }
        function announce(txt, time=2000) { const el = document.getElementById('announcer'); el.innerText = txt; el.style.display = 'block'; if(time > 0) setTimeout(() => el.style.display = 'none', time); }
        function createExplosion(x, y, color, count=40) { for(let i=0; i<count; i++) particles.push({ x, y, vx: (Math.random()-0.5)*1200, vy: (Math.random()-0.5)*1200, life: 1.0, color, size: Math.random()*8+4 }); }
        function checkCollisionRect(r1, r2) { return (r1.x < r2.x + r2.w && r1.x + r1.w > r2.x && r1.y < r2.y + r2.h && r1.y + r1.h > r2.y); }

        /* =====================================================================
           PART 4: MAIN LOOP & RENDERING
           ===================================================================== */
        let lastTime = performance.now();

        function startGame(mapId) {
            setTimeout(() => { 
                myWeapon = WEAPONS[document.getElementById('weapon-select').value]; document.getElementById('weapon-text').innerText = myWeapon.name;
                generateMap(mapId); document.getElementById('loading-screen').style.display = 'none'; document.getElementById('hud').style.display = 'block';
                STATE.isPlaying = true; respawn(); requestAnimationFrame(gameLoop);
            }, 2000);
        }

        function drawPerson(x, y, angle, color, gunColor, isDashing) {
            ctx.save(); ctx.translate(x, y); ctx.rotate(angle);
            if(isDashing) { ctx.globalAlpha = 0.5; ctx.scale(1.2, 0.8); } // Stretch effect on dash
            
            // Hands holding gun
            ctx.fillStyle = '#ffcc99'; ctx.beginPath(); ctx.arc(15, -16, 7, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(25, 12, 7, 0, Math.PI*2); ctx.fill();
            // Gun
            ctx.fillStyle = gunColor; ctx.fillRect(10, 5, 35, 10);
            // Body
            ctx.fillStyle = color; ctx.shadowColor = color; ctx.shadowBlur = 10;
            ctx.beginPath(); ctx.arc(0, 0, 22, 0, Math.PI*2); ctx.fill(); 
            ctx.shadowBlur = 0; ctx.lineWidth = 3; ctx.strokeStyle = '#111'; ctx.stroke();
            // Visor
            ctx.fillStyle = '#111'; ctx.fillRect(8, -12, 12, 24); ctx.fillStyle = '#00ffff'; ctx.fillRect(12, -8, 4, 16); // glowing eye slit
            ctx.restore();
        }

        function drawMinimap() {
            const mmSize = 250; const scale = mmSize / MAP_SIZE;
            ctx.save(); ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.translate(canvas.width - mmSize - 20, 20);
            ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 2; ctx.fillRect(0, 0, mmSize, mmSize); ctx.strokeRect(0, 0, mmSize, mmSize);
            ctx.fillStyle = 'rgba(100,100,100,0.5)'; for(let w of currentMap.walls) if(w.w < MAP_SIZE && w.h < MAP_SIZE) ctx.fillRect(w.x * scale, w.y * scale, w.w * scale, w.h * scale);
            for(let p of powerups) { ctx.fillStyle = p.color; ctx.fillRect(p.x * scale - 2, p.y * scale - 2, 4, 4); }
            if (NET.conn) { ctx.fillStyle = '#ff0055'; ctx.beginPath(); ctx.arc(enemy.x * scale, enemy.y * scale, 4, 0, Math.PI*2); ctx.fill(); }
            if (!STATE.isDead) { ctx.fillStyle = '#00ffff'; ctx.beginPath(); ctx.arc(player.x * scale, player.y * scale, 4, 0, Math.PI*2); ctx.fill(); }
            ctx.restore();
        }

        function gameLoop(timestamp) {
            if(!STATE.isPlaying) return;
            const dt = (timestamp - lastTime) / 1000; lastTime = timestamp;

            // Host Spawner
            if (NET.isHost && timestamp > STATE.nextPowerupSpawn && !STATE.isMatchOver) {
                STATE.nextPowerupSpawn = timestamp + 10000; // Every 10s
                const types = [{t:'speed', c:'#ffff00'}, {t:'shield', c:'#00ffff'}, {t:'damage', c:'#aa00ff'}]; const randType = types[Math.floor(Math.random() * types.length)];
                const newP = { id: Math.random().toString(), type: randType.t, color: randType.c, x: Math.random() * (MAP_SIZE - 400) + 200, y: Math.random() * (MAP_SIZE - 400) + 200 };
                powerups.push(newP); if(NET.conn) NET.conn.send({ type: 'spawn_powerup', p: newP });
            }

            if (STATE.buffs.speed > 0) { STATE.buffs.speed -= dt * 1000; if(STATE.buffs.speed <= 0) updateHUD(); }
            if (STATE.buffs.damage > 0) { STATE.buffs.damage -= dt * 1000; if(STATE.buffs.damage <= 0) updateHUD(); }
            if (player.dashCd > 0) {
                player.dashCd -= dt * 1000;
                document.getElementById('dash-cd').style.display = 'block';
            } else {
                document.getElementById('dash-cd').style.display = 'none';
            }

            // Input & Physics
            if (!STATE.isDead && !STATE.isMatchOver) {
                mouse.worldX = mouse.x + camera.x - canvas.width/2; mouse.worldY = mouse.y + camera.y - canvas.height/2;
                player.angle = Math.atan2(mouse.worldY - player.y, mouse.worldX - player.x);

                if (mouse.down) fireWeapon(); if (keys.r && !STATE.isReloading && STATE.currentAmmo < myWeapon.mag) triggerReload();

                // Dash Logic
                if (keys[' '] && player.dashCd <= 0 && !player.isDashing) {
                    player.isDashing = true; player.dashCd = 1500;
                    setTimeout(() => { player.isDashing = false; }, 200); // Dash lasts 200ms
                }

                let dx = 0; let dy = 0;
                if (keys.w) dy -= 1; if (keys.s) dy += 1; if (keys.a) dx -= 1; if (keys.d) dx += 1;
                
                let mag = Math.hypot(dx, dy); if (mag > 0) { dx /= mag; dy /= mag; }

                // Movement Speed calculation
                let baseSpeed = STATE.buffs.speed > 0 ? 500 : 300;
                let targetVx = dx * baseSpeed; let targetVy = dy * baseSpeed;

                if (player.isDashing) { targetVx = dx * 1200; targetVy = dy * 1200; trails.push({x:player.x, y:player.y, a:player.angle, life: 0.5}); }

                // Friction / Acceleration
                player.vx += (targetVx - player.vx) * 10 * dt; player.vy += (targetVy - player.vy) * 10 * dt;

                // X Collision
                player.x += player.vx * dt; let pBox = { x: player.x - player.radius, y: player.y - player.radius, w: player.radius*2, h: player.radius*2 };
                for(let w of currentMap.walls) if(checkCollisionRect(pBox, w)) { if(player.vx > 0) player.x = w.x - player.radius; else player.x = w.x + w.w + player.radius; player.vx = 0;}

                // Y Collision
                player.y += player.vy * dt; pBox = { x: player.x - player.radius, y: player.y - player.radius, w: player.radius*2, h: player.radius*2 };
                for(let w of currentMap.walls) if(checkCollisionRect(pBox, w)) { if(player.vy > 0) player.y = w.y - player.radius; else player.y = w.y + w.h + player.radius; player.vy = 0;}

                // Collect Powerups
                for (let i = powerups.length - 1; i >= 0; i--) {
                    let p = powerups[i];
                    if (Math.hypot(player.x - p.x, player.y - p.y) < player.radius + 20) {
                        collectPowerup(p.type); if (NET.conn) NET.conn.send({ type: 'collect_powerup', id: p.id, x: p.x, y: p.y });
                        createExplosion(p.x, p.y, '#ffffff', 20); powerups.splice(i, 1);
                    }
                }

                if (NET.conn && timestamp % 50 < 20) NET.conn.send({ type: 'move', x: player.x, y: player.y, a: player.angle, dash: player.isDashing });
            }

            // Bullet Logic
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i]; b.x += b.vx * dt; b.y += b.vy * dt; b.life--;
                let destroyed = false;
                for(let w of currentMap.walls) if(b.x > w.x && b.x < w.x+w.w && b.y > w.y && b.y < w.y+w.h) { createExplosion(b.x, b.y, currentMap.border, 10); destroyed = true; break; }

                if (b.isMine && !destroyed && !STATE.isMatchOver) {
                    if (Math.hypot(b.x - enemy.x, b.y - enemy.y) < enemy.radius + b.radius && !enemy.isDashing) {
                        createExplosion(b.x, b.y, '#ff0000', 15); if(NET.conn) NET.conn.send({ type: 'hit', dmg: b.damage }); destroyed = true;
                    }
                }
                if (destroyed || b.life <= 0) bullets.splice(i, 1);
            }

            // Particles, Trails & Camera
            for (let i = particles.length - 1; i >= 0; i--) { let p = particles[i]; p.x += p.vx * dt; p.y += p.vy * dt; p.vx *= 0.92; p.vy *= 0.92; p.life -= dt * 2.0; if(p.life <= 0) particles.splice(i, 1); }
            for (let i = trails.length - 1; i >= 0; i--) { let t = trails[i]; t.life -= dt * 2; if(t.life <= 0) trails.splice(i, 1); }
            
            camera.x += (player.x - camera.x) * 0.15; camera.y += (player.y - camera.y) * 0.15; if(STATE.screenShake > 0) STATE.screenShake *= 0.85;

            // Render
            ctx.fillStyle = currentMap.bg; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.save(); let sx = (Math.random()-0.5)*STATE.screenShake; let sy = (Math.random()-0.5)*STATE.screenShake; ctx.translate(canvas.width/2 - camera.x + sx, canvas.height/2 - camera.y + sy);

            ctx.strokeStyle = currentMap.grid; ctx.lineWidth = 2; ctx.beginPath();
            for(let i=0; i<=MAP_SIZE; i+=150) { ctx.moveTo(i,0); ctx.lineTo(i,MAP_SIZE); ctx.moveTo(0,i); ctx.lineTo(MAP_SIZE,i); } ctx.stroke();

            ctx.fillStyle = currentMap.fill; ctx.strokeStyle = currentMap.border; ctx.lineWidth = 3;
            for(let w of currentMap.walls) if(w.w < MAP_SIZE && w.h < MAP_SIZE) { ctx.fillRect(w.x, w.y, w.w, w.h); ctx.strokeRect(w.x, w.y, w.w, w.h); }

            for(let p of powerups) { ctx.fillStyle = p.color; ctx.shadowColor = p.color; ctx.shadowBlur = 15; ctx.fillRect(p.x - 15, p.y - 15, 30, 30); ctx.fillStyle = '#fff'; ctx.shadowBlur = 0; ctx.textAlign = 'center'; ctx.font = 'bold 16px Courier'; ctx.fillText('?', p.x, p.y + 5); }

            // Draw Dash Trails
            for(let t of trails) { ctx.globalAlpha = t.life; drawPerson(t.x, t.y, t.a, player.color, myWeapon.color, true); } ctx.globalAlpha = 1.0;

            if (NET.conn && !enemy.isDashing) drawPerson(enemy.x, enemy.y, enemy.angle, enemy.color, enemyWeapon.color, false);
            if (!STATE.isDead) drawPerson(player.x, player.y, player.angle, player.color, myWeapon.color, player.isDashing);

            for(let b of bullets) { ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2); ctx.fillStyle = b.color; ctx.shadowColor = b.color; ctx.shadowBlur = 8; ctx.fill(); ctx.shadowBlur = 0; }
            for(let p of particles) { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size, p.size); }
            
            ctx.globalAlpha = 1.0; ctx.restore(); drawMinimap(); requestAnimationFrame(gameLoop);
        }
    </script>
